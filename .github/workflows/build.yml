name: Build Windows Exe

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Build exe
        run: pyinstaller --onefile --windowed --name "DesktopCompanion" desktop_companion.py

      - name: Upload exe as artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopCompanion-windows-exe
          path: dist/DesktopCompanion.exe
